description: >-
  Local Contexts is a global initiative that supports Indigenous communities
  with tools that can reassert cultural authority in heritage collections and
  data. This resource type contains the URL (since there are two different Local
  Contexts Hub URLs), the project ID, and the account API key.
format_extension: null
is_fileset: false
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  order:
    - server_url
    - api_key
    - project_id
  properties:
    api_key:
      type: string
      description: ''
      default: ''
      nullable: false
      password: true
    project_id:
      type: string
      description: ''
      default: ''
      nullable: false
    server_url:
      type: string
      description: ''
      default: 'https://localcontextshub.org/api/'
      nullable: false
      placeholder: ''
  required:
    - server_url
    - api_key
    - project_id
