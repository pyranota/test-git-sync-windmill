description: >-
  You can use this for secure API authentication for non-interactive
  applications (clients), like a machine-to-machine service.
format_extension: null
is_fileset: false
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  order:
    - domain
    - client_id
    - client_secret
  properties:
    client_id:
      type: string
      description: ''
      default: ''
      nullable: false
    client_secret:
      type: string
      description: ''
      default: ''
      nullable: false
    domain:
      type: string
      description: 'For example, "<tenant>.us.auth0.com"'
      default: ''
      nullable: false
  required:
    - domain
    - client_id
    - client_secret
