description: >-
  This pair can be used to authenticate with many of Mapbox's API services, like
  the Mapbox Tiling Service (MTS)
format_extension: null
is_fileset: false
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  order:
    - username
    - access_token
  properties:
    access_token:
      type: string
      description: Can be either a public token (`pk.ey...`) or secret token (`sk.ey...`)
      default: ''
      nullable: false
      password: true
      pattern: ^(pk|sk)\.ey
    username:
      type: string
      description: The Mapbox username of the account
      default: ''
      nullable: false
  required:
    - username
    - access_token
